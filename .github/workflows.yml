name: Security CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Layer 1: Dependency CVE scan ──────────────────────────────────────────
  dependency-scan:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install
      - name: npm audit
        run: npm audit --audit-level=high

  # ── Layer 2: Claude AI code review ───────────────────────────────────────
  claude-scan:
    name: Claude AI Security Review
    runs-on: ubuntu-latest
    needs: dependency-scan
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Run Claude Security Scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node security-scan.js

  # ── Layer 3: Runtime / DAST scan ─────────────────────────────────────────
  dast-scan:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    needs: claude-scan
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install
      - name: Start app
        run: node app.js &
      - name: Wait for app to be ready
        run: npx wait-on http://localhost:8080 --timeout 15000
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.9.0
        with:
          target: 'http://localhost:8080'
          fail_action: false   # set to true to hard-fail on ZAP findings

  # ── Layer 4: Secret detection ─────────────────────────────────────────────
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
