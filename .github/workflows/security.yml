name: Security CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Layer 1: Dependency CVE scan ──────────────────────────────────────────
  dependency-scan:
    name: Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nodejs-app
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install
      - name: npm audit
        run: npm audit --audit-level=high || true  # warn only, does not block pipeline

  # ── Layer 2: Claude AI code review ───────────────────────────────────────
  claude-scan:
    name: Claude AI Security Review
    runs-on: ubuntu-latest
    needs: dependency-scan
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Run Claude Security Scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node security-scan.js
        continue-on-error: true  # warn only, does not block pipeline

  # ── Layer 3: Runtime / DAST scan ─────────────────────────────────────────
  dast-scan:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    needs: claude-scan
    defaults:
      run:
        working-directory: nodejs-app
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install
      - name: Start app
        run: |
          node server.js > /tmp/app.log 2>&1 &
          echo "App PID: $!"
          sleep 3
          echo "--- app.log ---"
          cat /tmp/app.log
      - name: Wait for app to be ready
        run: |
          echo "Waiting for app on port 8080..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "✅ App is ready!"
              exit 0
            fi
            echo "Attempt $i/30 — retrying in 1s..."
            cat /tmp/app.log
            sleep 1
          done
          echo "❌ App did not start in time"
          echo "--- Final app.log ---"
          cat /tmp/app.log
          exit 1
      - name: Fix workspace permissions for ZAP
        run: chmod 777 ${{ github.workspace }}

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.9.0
        with:
          target: 'http://localhost:8080'
          fail_action: false
          allow_issue_writing: false

  # ── Layer 4: Secret detection ─────────────────────────────────────────────
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified
